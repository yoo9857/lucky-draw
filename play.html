<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>오늘의 행운 🍀</title>
<link rel="icon" type="image/png" href="assets/icon.png" />
<link rel="apple-touch-icon" href="assets/icon.png" />
<style>
  :root{--ink:#2A2150;--muted:#7C76A8;--brand:#7C5CFF;--gold:#FF9F45;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:-apple-system,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
    color:var(--ink);display:flex;justify-content:center;align-items:flex-start;background:#0e0a1f;overflow-x:hidden;}
  .bg{position:fixed;inset:-30%;z-index:-2;filter:saturate(1.1);
    background:radial-gradient(40% 50% at 20% 20%,#A78BFA 0%,transparent 60%),
      radial-gradient(45% 55% at 85% 15%,#F0A6E0 0%,transparent 60%),
      radial-gradient(50% 60% at 50% 90%,#7DE3D0 0%,transparent 60%),
      linear-gradient(135deg,#EEE7FF,#FFE9FB 50%,#E4FBF4);animation:drift 16s ease-in-out infinite alternate;}
  @keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(2%,-2%) scale(1.08)}}
  .grain{position:fixed;inset:0;z-index:-1;opacity:.35;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.5) 1px,transparent 1px);background-size:22px 22px;}
  .gdeco{position:fixed;z-index:0;pointer-events:none;opacity:.7;filter:drop-shadow(0 2px 6px rgba(120,70,160,.2));animation:floaty 4.4s ease-in-out infinite;}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .phone{width:432px;max-width:100vw;min-height:100vh;min-height:100dvh;position:relative;
    display:flex;flex-direction:column;
    padding:calc(18px + env(safe-area-inset-top)) 18px calc(26px + env(safe-area-inset-bottom));}
  .statusbar,.headrow,.panel,.actions,.nav{flex-shrink:0;}
  .glass{background:rgba(255,255,255,.46);border:1px solid rgba(255,255,255,.7);
    box-shadow:0 10px 30px rgba(124,92,255,.15),inset 0 1px 0 rgba(255,255,255,.6);
    backdrop-filter:blur(18px) saturate(1.3);-webkit-backdrop-filter:blur(18px) saturate(1.3);}

  /* 상단 상태바 */
  .statusbar{display:flex;gap:10px;margin-bottom:12px;}
  .chip{flex:1;border-radius:16px;padding:10px 12px;display:flex;align-items:center;gap:8px;}
  .chip .ic{font-size:18px;}
  .chip .col .v{font-size:15px;font-weight:850;line-height:1.1;}
  .chip .col .l{font-size:10.5px;color:var(--muted);font-weight:600;}

  h1{font-size:27px;font-weight:850;letter-spacing:-.5px;margin:2px 2px 2px;
    background:linear-gradient(100deg,#6D5BFF,#C65CFF 60%,#3FD8B6);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{font-size:13px;color:var(--muted);margin:0 2px 12px;font-weight:500;}
  .topright{display:flex;gap:8px;align-items:center;}
  .miniBtn{font-size:11px;font-weight:800;color:var(--brand);background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.8);
    padding:7px 11px;border-radius:999px;cursor:pointer;}
  .daily{background:linear-gradient(100deg,#FFB35C,#FF7AD9);color:#fff;border:0;animation:bob 1.2s ease infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  .headrow{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;}
  .titlerow{display:flex;align-items:center;gap:9px;}
  .logo{width:38px;height:38px;border-radius:11px;box-shadow:0 4px 12px rgba(124,92,255,.35);}

  .stage{border-radius:24px;padding:18px 14px;margin-bottom:12px;min-height:128px;flex:1 1 auto;
    display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .stage .glow{position:absolute;width:240px;height:240px;border-radius:50%;filter:blur(48px);opacity:0;transition:opacity .4s;
    background:radial-gradient(circle,var(--brand),transparent 70%);}
  .balls{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;align-items:center;z-index:1;}
  .ball{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:850;font-size:16px;color:#fff;box-shadow:0 6px 14px rgba(0,0,0,.12);background:linear-gradient(145deg,#9b8cff,#7C5CFF);transform:scale(0);}
  .ball.show{animation:drop .4s cubic-bezier(.2,1.3,.4,1) forwards;}
  .ball.hit{background:linear-gradient(145deg,#FFD56B,#FF9F45);box-shadow:0 0 0 3px #fff,0 8px 18px rgba(255,159,69,.5);
    animation:drop .4s cubic-bezier(.2,1.3,.4,1) forwards, pulse 1.1s ease infinite .45s;}
  .ball.bonus{background:linear-gradient(145deg,#5BE0C0,#2FB39A);}
  .ball.bonus.hit{background:linear-gradient(145deg,#FFD56B,#FF9F45);}
  .plus{font-weight:850;color:var(--muted);font-size:18px;align-self:center;}
  @keyframes drop{0%{transform:scale(0) translateY(-26px) rotate(-18deg);opacity:0}100%{transform:scale(1) translateY(0) rotate(0);opacity:1}}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px #fff,0 8px 18px rgba(255,159,69,.5)}50%{box-shadow:0 0 0 5px #fff,0 10px 24px rgba(255,159,69,.8)}}
  .verdict{z-index:1;text-align:center;margin-top:8px;}
  .verdict .em{font-size:44px;line-height:1;filter:drop-shadow(0 6px 12px rgba(124,92,255,.3));}
  .verdict .gr{font-size:22px;font-weight:850;margin-top:2px;letter-spacing:-.5px;}
  .verdict .pt{font-size:18px;font-weight:850;background:linear-gradient(90deg,#6D5BFF,#C65CFF);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .verdict .near{font-size:13px;color:var(--gold);font-weight:800;margin-top:4px;}
  .placeholder{color:var(--muted);font-weight:600;font-size:14px;z-index:1;text-align:center;line-height:1.5;}
  .drawing{color:var(--brand);font-weight:800;z-index:1;}
  .ring{width:54px;height:54px;border-radius:50%;border:6px solid rgba(124,92,255,.18);border-top-color:var(--brand);animation:rot .7s linear infinite;margin-bottom:8px;}
  @keyframes rot{to{transform:rotate(360deg)}}

  .panel{border-radius:20px;padding:14px 12px;margin-bottom:12px;}
  .panel .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .panel .head .t{font-size:13.5px;font-weight:800;}
  .panel .head .c{font-size:12.5px;font-weight:800;color:var(--brand);}
  .grid{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;}
  .num{aspect-ratio:1;border:0;border-radius:50%;font-weight:800;font-size:13px;cursor:pointer;color:var(--ink);
    background:rgba(255,255,255,.72);box-shadow:inset 0 0 0 1px rgba(124,92,255,.12);transition:transform .1s;}
  .num:active{transform:scale(.88);}
  .num.sel{color:#fff;background:linear-gradient(145deg,#7C5CFF,#B95CFF);box-shadow:0 5px 12px rgba(124,92,255,.4);}
  .num:disabled{opacity:.38;cursor:default;}

  .actions{display:flex;gap:10px;}
  .btn{flex:1;border:0;border-radius:17px;padding:15px;font-size:15.5px;font-weight:850;cursor:pointer;letter-spacing:-.3px;transition:transform .12s,box-shadow .12s;}
  .btn.ghost{background:rgba(255,255,255,.6);color:var(--brand);box-shadow:inset 0 0 0 1px rgba(124,92,255,.2);}
  .btn.primary{color:#fff;background:linear-gradient(100deg,#7C5CFF,#B95CFF 55%,#FF7AD9);box-shadow:0 14px 26px rgba(124,92,255,.4);flex:1.7;}
  .btn.primary:disabled{background:linear-gradient(100deg,#C9C3E6,#D8CFEA);box-shadow:none;cursor:default;}
  .btn:active{transform:translateY(2px) scale(.99);}
  .btn .small{font-size:11px;font-weight:700;opacity:.9;}

  .nav{display:flex;gap:8px;justify-content:space-between;margin-top:14px;}
  .nav button{flex:1;border:0;background:rgba(255,255,255,.5);border-radius:14px;padding:11px 4px;font-size:12px;font-weight:800;color:var(--ink);cursor:pointer;}
  .nav button .ni{display:block;font-size:18px;margin-bottom:2px;}

  /* 시트 */
  .sheet-wrap{position:fixed;inset:0;z-index:20;display:none;align-items:flex-end;justify-content:center;background:rgba(40,30,70,.4);}
  .sheet-wrap.open{display:flex;}
  .sheet{width:432px;max-width:100vw;max-height:86vh;overflow-y:auto;border-radius:26px 26px 0 0;padding:22px 20px 30px;
    transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.9,.3,1);background:rgba(255,255,255,.9);backdrop-filter:blur(24px);}
  .sheet-wrap.open .sheet{transform:translateY(0);}
  .sheet h2{font-size:19px;font-weight:850;margin-bottom:4px;}
  .sheet p.d{font-size:12.5px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
  .row{display:flex;align-items:center;padding:11px 4px;border-bottom:1px solid rgba(124,92,255,.1);}
  .row .n{flex:1.5;font-weight:800;font-size:14px;}
  .row .m{flex:1.3;font-size:12.5px;color:var(--muted);font-weight:600;}
  .row .pt{flex:1;text-align:right;font-weight:850;color:var(--brand);font-size:13.5px;}
  .ach{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid rgba(124,92,255,.1);}
  .ach .ai{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(124,92,255,.1);}
  .ach.done .ai{background:linear-gradient(145deg,#FFD56B,#FF9F45);}
  .ach .at{flex:1;}
  .ach .at .t{font-weight:800;font-size:14px;}
  .ach .at .s{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .ach .badge{font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;}
  .ach.done .badge{background:rgba(255,159,69,.18);color:#E07A1F;}
  .ach .badge.todo{background:rgba(124,92,255,.1);color:var(--brand);}
  .rk{display:flex;align-items:center;gap:10px;padding:10px 6px;border-radius:12px;}
  .rk.me{background:linear-gradient(100deg,rgba(124,92,255,.14),rgba(255,122,217,.14));box-shadow:inset 0 0 0 1px rgba(124,92,255,.25);}
  .rk .rank{width:30px;font-weight:850;font-size:15px;text-align:center;}
  .rk .nm{flex:1;font-weight:700;font-size:14px;}
  .rk .sc{font-weight:850;color:var(--brand);font-size:13.5px;}
  .close{width:100%;margin-top:16px;border:0;border-radius:16px;padding:14px;font-weight:800;font-size:15px;color:#fff;
    background:linear-gradient(100deg,#7C5CFF,#B95CFF);cursor:pointer;}
  .note{font-size:11.5px;color:var(--muted);margin-top:12px;line-height:1.7;opacity:.9;}
  .ball.hit{position:relative;}
  .ball.hit::after{content:'✓';position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;
    background:#1FAE78;color:#fff;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .muteBtn{font-size:15px;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.8);width:34px;height:34px;border-radius:50%;cursor:pointer;}
  .adbtn{width:100%;border:0;border-radius:14px;padding:14px;font-weight:800;font-size:14px;cursor:pointer;margin-bottom:10px;color:#fff;
    background:linear-gradient(100deg,#2FB39A,#5BE0C0);}
  .exbtn{width:100%;border:0;border-radius:14px;padding:14px;font-weight:800;font-size:14px;cursor:pointer;color:var(--brand);background:rgba(124,92,255,.1);}
  .prob{flex:.9;text-align:right;font-size:11px;color:var(--muted);font-weight:700;}
  /* ===== 랭킹 풀스크린 페이지 (rank.png 매칭) ===== */
  .rankpage{position:fixed;inset:0;z-index:25;display:none;flex-direction:column;overflow:hidden;
    background:linear-gradient(165deg,#8E6FE6 0%,#B98FE0 45%,#EC9DD2 100%);}
  .rankpage.open{display:flex;}
  .rp-deco{position:absolute;pointer-events:none;z-index:1;filter:drop-shadow(0 2px 6px rgba(120,70,160,.25));}
  .rp-bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.7),rgba(255,255,255,.05));pointer-events:none;z-index:1;}
  .rp-scroll{flex:1;overflow-y:auto;position:relative;z-index:2;
    padding:calc(56px + env(safe-area-inset-top)) 18px calc(30px + env(safe-area-inset-bottom));}
  .rp-close{position:absolute;top:calc(16px + env(safe-area-inset-top));right:16px;z-index:6;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.28);border:0;color:#fff;font-size:18px;font-weight:800;cursor:pointer;backdrop-filter:blur(6px);}
  .rp-title{color:#fff;text-align:center;font-size:21px;font-weight:850;line-height:1.32;text-shadow:0 2px 10px rgba(90,45,130,.45);}
  .rp-sub{color:rgba(255,255,255,.88);text-align:center;font-size:11.5px;margin-top:7px;margin-bottom:18px;font-weight:600;}
  .rp-tabs{display:flex;gap:7px;justify-content:center;margin-bottom:20px;}
  .rp-tab{padding:9px 17px;border-radius:999px;font-size:12.5px;font-weight:800;color:rgba(255,255,255,.9);background:rgba(255,255,255,.16);cursor:pointer;}
  .rp-tab.on{background:linear-gradient(100deg,#7C5CFF,#9B7BFF);color:#fff;box-shadow:0 6px 14px rgba(70,35,120,.45);}
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:18px;}
  .pod{display:flex;flex-direction:column;align-items:center;width:33%;}
  .pod .crown{font-size:26px;margin-bottom:-4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));}
  .pod .ava{width:62px;height:62px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;border:3px solid #fff;box-shadow:0 8px 18px rgba(80,40,120,.35);}
  .pod.first .ava{width:80px;height:80px;font-size:42px;border-color:#FFD56B;box-shadow:0 10px 22px rgba(255,170,60,.5);}
  .pod .nm{color:#fff;font-weight:800;font-size:12.5px;margin-top:7px;text-shadow:0 1px 4px rgba(90,45,130,.4);}
  .pod .sc{color:#fff;font-weight:850;font-size:12px;background:rgba(255,255,255,.22);padding:3px 11px;border-radius:999px;margin-top:5px;}
  .pod .base{margin-top:9px;width:90%;border-radius:14px 14px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:8px;color:#fff;font-weight:900;font-size:20px;text-shadow:0 1px 3px rgba(0,0,0,.25);}
  .pod.first .base{height:92px;background:linear-gradient(#FFE48F,#FFB347);}
  .pod.second .base{height:66px;background:linear-gradient(#EEF0F6,#BBC2D2);}
  .pod.third .base{height:50px;background:linear-gradient(#F6CFA6,#DB9C6C);}
  .rp-list{background:rgba(255,255,255,.94);border-radius:22px;padding:4px 12px;box-shadow:0 10px 30px rgba(90,45,130,.2);}
  .rp-row{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid #F1ECFA;}
  .rp-row:last-child{border-bottom:0;}
  .rp-rank{width:22px;text-align:center;font-weight:850;color:#9A92BE;font-size:15px;}
  .rp-ava{width:38px;height:38px;border-radius:50%;background:#F1ECFF;display:flex;align-items:center;justify-content:center;font-size:20px;}
  .rp-nm{flex:1;font-weight:700;font-size:13.5px;color:#2A2150;}
  .rp-sc{font-weight:850;color:#7C5CFF;font-size:13.5px;}
  .rp-up{font-size:10.5px;font-weight:800;margin-left:5px;width:26px;text-align:right;}
  .rp-up.up{color:#22C098;} .rp-up.down{color:#FF6B8A;} .rp-up.same{color:#C2BCD8;}
  .rp-me{margin-top:12px;background:linear-gradient(100deg,#7C5CFF,#B95CFF);border-radius:18px;padding:13px 14px;display:flex;align-items:center;gap:11px;box-shadow:0 10px 22px rgba(124,92,255,.55);}
  .rp-me .rp-rank{color:#fff;} .rp-me .rp-nm{color:#fff;} .rp-me .rp-sc{color:#fff;}
  .rp-me .rp-ava{background:rgba(255,255,255,.28);}
  .rp-note{text-align:center;color:rgba(255,255,255,.72);font-size:10.5px;margin-top:16px;line-height:1.5;}
  canvas#fx{position:fixed;inset:0;z-index:15;pointer-events:none;}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);z-index:30;opacity:0;
    background:rgba(42,33,80,.95);color:#fff;padding:12px 18px;border-radius:14px;font-weight:700;font-size:13.5px;transition:all .3s;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="bg"></div><div class="grain"></div>
<div class="gdeco" style="top:14px;left:14px;font-size:24px;animation-delay:0s">🍀</div>
<div class="gdeco" style="top:70px;right:16px;font-size:18px;animation-delay:.8s">✨</div>
<div class="gdeco" style="bottom:24px;left:18px;font-size:22px;animation-delay:.4s">🍀</div>
<div class="gdeco" style="bottom:80px;right:18px;font-size:16px;animation-delay:1.1s">✨</div>
<canvas id="fx"></canvas>
<div class="toast" id="toast"></div>

<div class="phone">
  <!-- 상태바: 티켓 / 포인트 -->
  <div class="statusbar">
    <div class="chip glass"><span class="ic">🎟️</span><div class="col"><div class="v" id="tickets">5/5</div><div class="l" id="ticketTimer">가득 찼어요</div></div></div>
    <div class="chip glass"><span class="ic">💎</span><div class="col"><div class="v" id="points">0P</div><div class="l">보유 포인트</div></div></div>
  </div>

  <div class="headrow">
    <div>
      <div class="titlerow"><img class="logo" src="assets/icon.png" alt="오늘의 행운"/><h1>오늘의 행운</h1></div>
      <div class="sub">번호 6개를 골라 추첨에 도전하세요 🍀</div>
    </div>
    <div class="topright">
      <button class="muteBtn" id="muteBtn" onclick="toggleMute()" title="소리">🔊</button>
      <button class="miniBtn" id="dailyBtn" onclick="claimDaily()">🎁 데일리</button>
    </div>
  </div>

  <!-- 추첨 무대 -->
  <div class="stage glass" id="stage">
    <div class="glow" id="glow"></div>
    <div class="placeholder" id="ph">번호 6개를 고르고<br>‘추첨하기’를 눌러보세요</div>
    <div class="balls" id="balls"></div>
    <div class="verdict" id="verdict" style="display:none"></div>
  </div>

  <!-- 번호 선택 -->
  <div class="panel glass">
    <div class="head"><span class="t">내 번호 (1~45)</span><span class="c" id="selcount">0 / 6</span></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="actions">
    <button class="btn ghost" id="autoBtn" onclick="autoPick()">🎲 자동</button>
    <button class="btn primary" id="drawBtn" onclick="onDraw()" disabled>추첨하기 <span class="small">🎟️1</span></button>
  </div>

  <!-- 하단 네비 -->
  <div class="nav">
    <button onclick="openSheet('odds')"><span class="ni">📊</span>등급표</button>
    <button onclick="openSheet('ach')"><span class="ni">🏅</span>도전과제</button>
    <button onclick="openSheet('recharge')"><span class="ni">🎫</span>충전</button>
    <button onclick="openRank()"><span class="ni">📈</span>랭킹</button>
    <button onclick="openSheet('more')"><span class="ni">⚙️</span>더보기</button>
  </div>
</div>

<!-- 시트들 -->
<div class="sheet-wrap" id="sheetWrap" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheetBody"></div>
</div>

<!-- 랭킹 풀스크린 페이지 -->
<div class="rankpage" id="rankPage">
  <span class="rp-deco" style="top:60px;left:14px;font-size:26px">🍀</span>
  <span class="rp-deco" style="top:120px;right:18px;font-size:30px">🍀</span>
  <span class="rp-deco" style="top:330px;left:10px;font-size:20px">🍀</span>
  <span class="rp-deco" style="bottom:120px;right:14px;font-size:34px">🏆</span>
  <span class="rp-deco" style="top:200px;right:30px;font-size:16px">✨</span>
  <span class="rp-deco" style="top:280px;left:40px;font-size:14px">✨</span>
  <div class="rp-bubble" style="width:60px;height:60px;top:90px;right:40px"></div>
  <div class="rp-bubble" style="width:36px;height:36px;top:250px;left:24px"></div>
  <div class="rp-bubble" style="width:80px;height:80px;bottom:60px;left:-10px"></div>
  <button class="rp-close" onclick="closeRank()">✕</button>
  <div class="rp-scroll">
    <div class="rp-title">행운 랭킹에서<br>나의 순위를 확인하세요</div>
    <div class="rp-sub">✦ 친구들과 함께 행운을 모아 더 높은 곳을 향해! ✦</div>
    <div class="rp-tabs">
      <div class="rp-tab on">전체 랭킹</div>
      <div class="rp-tab" onclick="toast('친구 랭킹은 출시 후 토스 친구 연동으로 제공돼요')">친구 랭킹</div>
      <div class="rp-tab" onclick="toast('월별 랭킹은 시즌제로 제공될 예정이에요')">월별 랭킹</div>
    </div>
    <div class="podium" id="podium"></div>
    <div class="rp-list" id="rpList"></div>
    <div class="rp-me" id="rpMe"></div>
    <div class="rp-note">매주 월요일 0시에 랭킹이 초기화돼요 · 점수는 게임 내 포인트 기준</div>
  </div>
</div>

<script>
// ================= 설정 =================
const POOL=45, PICK=6, MAX_TICKETS=5, REFILL_MS=10*60*1000; // 10분당 티켓 1개
let TEST=false; // 더보기에서 토글: 무한 티켓

// 등급 (정통 6/45 + 보너스). points 는 게임 포인트(환전 불가)
function classify(matches, bonusHit){
  if(matches===6) return {rank:1,label:'1등 잭팟',emoji:'🏆',points:1000000};
  if(matches===5 && bonusHit) return {rank:2,label:'2등',emoji:'🥈',points:50000};
  if(matches===5) return {rank:3,label:'3등',emoji:'🥉',points:5000};
  if(matches===4) return {rank:4,label:'4등',emoji:'🎖️',points:1000};
  if(matches===3) return {rank:5,label:'5등',emoji:'🎟️',points:100};
  return {rank:0,label:'꽝',emoji:'💨',points:0};
}
const TIER_TABLE=[
  {r:'1등',m:'6개 일치',p:1000000,e:'🏆',prob:'1 / 8,145,060'},
  {r:'2등',m:'5개 + 보너스',p:50000,e:'🥈',prob:'1 / 1,357,510'},
  {r:'3등',m:'5개 일치',p:5000,e:'🥉',prob:'1 / 35,724'},
  {r:'4등',m:'4개 일치',p:1000,e:'🎖️',prob:'1 / 733'},
  {r:'5등',m:'3개 일치',p:100,e:'🎟️',prob:'1 / 45'},
  {r:'꽝',m:'2개 이하',p:0,e:'💨',prob:'약 95.8%'},
];

// ================= 순수 로직 =================
function pickRandom(pool,count){const a=[];for(let i=1;i<=pool;i++)a.push(i);
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a.slice(0,count).sort((x,y)=>x-y);}
function drawLotto(){const all=pickRandom(POOL,PICK+1);return {win:all.slice(0,PICK).sort((a,b)=>a-b),bonus:all[PICK]};}
function countMatches(user,win){const s=new Set(win);return user.filter(n=>s.has(n)).length;}

// ================= 도전과제 정의 =================
const ACHS=[
  {id:'first',t:'첫 도전',s:'추첨 1회 하기',ic:'🎬',reward:{tickets:1},test:st=>st.plays>=1},
  {id:'p10',t:'단골 손님',s:'10회 플레이',ic:'🔁',reward:{points:500},test:st=>st.plays>=10},
  {id:'m3',t:'5등 당첨',s:'3개 맞히기',ic:'🎟️',reward:{points:300},test:st=>st.bestMatch>=3},
  {id:'m4',t:'4등 당첨',s:'4개 맞히기',ic:'🎖️',reward:{points:1500},test:st=>st.bestMatch>=4},
  {id:'m5',t:'고수의 길',s:'5개 맞히기',ic:'🥉',reward:{tickets:3},test:st=>st.bestMatch>=5},
  {id:'jack',t:'잭팟!',s:'6개 전부 맞히기',ic:'🏆',reward:{points:1000000},test:st=>st.bestMatch>=6},
  {id:'st3',t:'삼일천하',s:'3일 연속 출석',ic:'🔥',reward:{tickets:2},test:st=>st.streak>=3},
  {id:'st7',t:'개근상',s:'7일 연속 출석',ic:'🌟',reward:{tickets:5},test:st=>st.streak>=7},
];
const BOTS=[['행운왕',2300000],['로또요정',780000],['클로버킹',410000],['숫자술사',155000],['네잎클로버',62000],['오늘의별',18500],['행운초보',4200],['뉴비',600]];

// ================= 상태 =================
const KEY='lucky-draw-web/v3';
let state=load(), sel=[], busy=false;
function fresh(){return {points:0,plays:0,bestMatch:0,tickets:MAX_TICKETS,lastRefill:Date.now(),streak:0,lastDaily:null,achs:{},history:[],muted:false,onboarded:false};}
function load(){try{return Object.assign(fresh(),JSON.parse(localStorage.getItem(KEY)||'{}'));}catch{return fresh();}}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}

// 티켓 시간 충전
function refillTickets(){
  if(TEST){state.tickets=MAX_TICKETS;return;}
  if(state.tickets>=MAX_TICKETS){state.lastRefill=Date.now();return;}
  const elapsed=Date.now()-state.lastRefill;
  const gained=Math.floor(elapsed/REFILL_MS);
  if(gained>0){state.tickets=Math.min(MAX_TICKETS,state.tickets+gained);
    state.lastRefill=state.tickets>=MAX_TICKETS?Date.now():state.lastRefill+gained*REFILL_MS;save();}
}
function ticketTimerText(){
  if(TEST)return '테스트(무한)';
  if(state.tickets>=MAX_TICKETS)return '가득 찼어요';
  const left=REFILL_MS-((Date.now()-state.lastRefill)%REFILL_MS);
  const m=Math.floor(left/60000),s=Math.floor((left%60000)/1000);
  return '다음 충전 '+m+':'+String(s).padStart(2,'0');
}

// ================= 렌더 =================
function render(){
  refillTickets();
  document.getElementById('tickets').textContent=(TEST?'∞':state.tickets)+(TEST?'':'/'+MAX_TICKETS);
  document.getElementById('ticketTimer').textContent=ticketTimerText();
  document.getElementById('points').textContent=state.points.toLocaleString()+'P';
  document.getElementById('muteBtn').textContent=state.muted?'🔇':'🔊';
  document.getElementById('selcount').textContent=sel.length+' / '+PICK;
  const noTickets=!TEST && state.tickets<=0;
  const drawBtnEl=document.getElementById('drawBtn');
  if(noTickets){ drawBtnEl.disabled=false; drawBtnEl.innerHTML='🎫 충전하기'; }
  else { drawBtnEl.disabled=!(sel.length===PICK && !busy); drawBtnEl.innerHTML='추첨하기 <span class="small">🎟️1</span>'; }
  // 데일리 버튼
  const db=document.getElementById('dailyBtn');
  if(state.lastDaily===todayKey()){db.textContent='✅ 출석 '+state.streak+'일';db.classList.remove('daily');}
  else{db.textContent='🎁 데일리';db.classList.add('daily');}
  [...document.querySelectorAll('.num')].forEach(b=>{const n=+b.dataset.n;
    b.classList.toggle('sel',sel.includes(n));b.disabled=busy||(!sel.includes(n)&&sel.length>=PICK);});
}

function toggle(n){if(busy)return;const i=sel.indexOf(n);if(i>=0)sel.splice(i,1);else if(sel.length<PICK)sel.push(n);sel.sort((a,b)=>a-b);render();}
function autoPick(){if(busy)return;sel=pickRandom(POOL,PICK);render();}

// ================= 추첨 =================
function onDraw(){
  if(busy)return;
  if(!TEST && state.tickets<=0){openSheet('recharge');return;}
  if(sel.length!==PICK)return;
  busy=true;
  if(!TEST){state.tickets-=1; if(state.tickets===MAX_TICKETS-1)state.lastRefill=Date.now();}
  render();
  const {win,bonus}=drawLotto();
  const matches=countMatches(sel,win);
  const bonusHit=sel.includes(bonus);

  document.getElementById('ph').style.display='none';
  document.getElementById('verdict').style.display='none';
  document.getElementById('glow').style.opacity='0';
  const ballsEl=document.getElementById('balls'); ballsEl.innerHTML='';
  // 긴장감: 잠깐 추첨 중
  ballsEl.innerHTML='<div class="ring"></div>';
  setTimeout(()=>{
    ballsEl.innerHTML='';
    const seq=[...win.map(n=>({n,bonus:false})), {plus:true}, {n:bonus,bonus:true}];
    seq.forEach((item,idx)=>{
      setTimeout(()=>{
        if(item.plus){const p=document.createElement('div');p.className='plus';p.textContent='+';ballsEl.appendChild(p);return;}
        const el=document.createElement('div');
        const hit=sel.includes(item.n);
        el.className='ball '+(item.bonus?'bonus ':'')+(hit?'hit':'show');
        el.textContent=item.n; ballsEl.appendChild(el);
        beep(item.bonus?660:440+idx*30);
        if(idx===seq.length-1) setTimeout(()=>finish(matches,bonusHit,win,bonus),700);
      }, idx*420+150);
    });
  },550);
}

function finish(matches,bonusHit,win,bonus){
  const tier=classify(matches,bonusHit);
  state.points+=tier.points; state.plays+=1;
  if(matches>state.bestMatch)state.bestMatch=matches;
  state.history.unshift({t:new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    matches,bonusHit,rank:tier.rank,label:tier.label,emoji:tier.emoji,points:tier.points,my:[...sel],win,bonus});
  state.history=state.history.slice(0,20);
  save();
  const near=(matches===5&&!bonusHit);
  const v=document.getElementById('verdict'); v.style.display='block';
  v.innerHTML='<div class="em">'+tier.emoji+'</div>'+
    '<div class="gr">'+(tier.rank>0?tier.label+' · '+matches+'개':matches+'개 일치')+'</div>'+
    '<div class="pt">+'+tier.points.toLocaleString()+'P</div>'+
    (tier.rank===1?'<div class="near">🎉 잭팟! 전설이에요!</div>':
     near?'<div class="near">😫 보너스 하나 차이! 아깝다…</div>':
     (matches===2?'<div class="near" style="color:var(--muted)">아쉽! 하나만 더 맞으면 당첨</div>':''))+
    (tier.rank>0?'<button class="miniBtn" style="margin-top:10px" onclick="shareResult('+tier.rank+','+matches+')">📤 자랑하기</button>':'');
  if(tier.points>0){document.getElementById('glow').style.opacity=tier.rank<=2?'.9':'.45';
    confetti(tier.rank===1?320:tier.rank===2?220:tier.rank===3?150:tier.rank===4?90:55);
    win_chime(tier.rank);}
  else if(matches===2){confetti(0);}
  busy=false; render();
  checkAchievements();
}

// ================= 데일리 / 연속출석 =================
function claimDaily(){
  const t=todayKey();
  if(state.lastDaily===t){openSheet('more');return;}
  // 연속 판정
  const y=new Date(); y.setDate(y.getDate()-1);
  const yk=y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate();
  state.streak=(state.lastDaily===yk)?state.streak+1:1;
  state.lastDaily=t;
  const bonusTickets=Math.min(5,2+Math.floor(state.streak/3));
  const bonusPts=50*state.streak;
  state.tickets=Math.min(MAX_TICKETS,state.tickets+bonusTickets);
  state.points+=bonusPts;
  save();
  toast('🎁 '+state.streak+'일 연속! 티켓 +'+bonusTickets+', '+bonusPts+'P');
  confetti(80); render(); checkAchievements();
}

// ================= 도전과제 =================
function checkAchievements(){
  let any=false;
  ACHS.forEach(a=>{
    if(!state.achs[a.id] && a.test(state)){
      state.achs[a.id]=true; any=true;
      if(a.reward.points)state.points+=a.reward.points;
      if(a.reward.tickets)state.tickets=Math.min(MAX_TICKETS,state.tickets+a.reward.tickets);
      setTimeout(()=>toast('🏅 도전과제 달성: '+a.t),300);
    }
  });
  if(any){save();render();}
}

// ================= 시트 =================
function openSheet(which){
  const b=document.getElementById('sheetBody');
  if(which==='odds'){
    b.innerHTML='<h2>당첨 등급 · 확률 🎯</h2><p class="d">1~45 중 6개를 골라 추첨 6개 + 보너스 1개와 비교해요. 무료 · 포인트 현금 환전 불가(사행성 없음).</p>'+
      '<div class="row" style="opacity:.6"><div class="n" style="font-size:11px">등급</div><div class="m" style="font-size:11px">조건</div><div class="prob" style="font-size:10px">당첨 확률</div><div class="pt" style="font-size:11px">포인트</div></div>'+
      TIER_TABLE.map(t=>'<div class="row"><div class="n">'+t.e+' '+t.r+'</div><div class="m">'+t.m+'</div><div class="prob">'+t.prob+'</div><div class="pt">'+t.p.toLocaleString()+'P</div></div>').join('')+
      '<div class="note">· 위 확률은 실제 추첨과 동일해요(정통 6/45). 당첨이 어려운 만큼 티켓·데일리로 자주 도전하는 게 핵심!</div>'+
      '<button class="close" onclick="closeSheet()">닫기</button>';
  } else if(which==='recharge'){
    const exCost=200;
    b.innerHTML='<h2>티켓 충전 🎫</h2><p class="d">티켓이 없어도 괜찮아요. 광고를 보거나 포인트로 바꿀 수 있어요. (10분마다 1개씩 자동 충전)</p>'+
      '<div class="ach"><div class="ai">🎟️</div><div class="at"><div class="t">보유 티켓 '+(TEST?'∞':state.tickets+' / '+MAX_TICKETS)+'</div><div class="s">'+ticketTimerText()+'</div></div></div>'+
      '<button class="adbtn" onclick="watchAd()">📺 광고 보고 티켓 +2</button>'+
      '<button class="exbtn" onclick="buyTicketWithPoints('+exCost+')">💎 '+exCost+'P → 🎟️ 티켓 1개</button>'+
      '<div class="note">실제 앱에선 토스 보상형 광고 SDK로 동작해요(여기선 모의).</div>'+
      '<button class="close" onclick="closeSheet()">닫기</button>';
  } else if(which==='ach'){
    const done=ACHS.filter(a=>state.achs[a.id]).length;
    b.innerHTML='<h2>도전과제 🏅 <span style="font-size:13px;color:var(--muted)">'+done+'/'+ACHS.length+'</span></h2><p class="d">달성하면 티켓·포인트를 드려요.</p>'+
      ACHS.map(a=>{const d=state.achs[a.id];const rw=a.reward.points?(a.reward.points.toLocaleString()+'P'):('🎟️'+a.reward.tickets);
        return '<div class="ach'+(d?' done':'')+'"><div class="ai">'+(d?a.ic:'🔒')+'</div><div class="at"><div class="t">'+a.t+'</div><div class="s">'+a.s+' · 보상 '+rw+'</div></div><div class="badge '+(d?'':'todo')+'">'+(d?'완료':'도전')+'</div></div>';
      }).join('')+'<button class="close" onclick="closeSheet()">닫기</button>';
  } else if(which==='rank'){
    const board=[...BOTS.map(([nm,sc])=>({nm,sc,me:false})),{nm:'나',sc:state.points,me:true}].sort((a,b)=>b.sc-a.sc);
    const myRank=board.findIndex(x=>x.me)+1;
    b.innerHTML='<h2>랭킹 📈 <span style="font-size:13px;color:var(--muted)">내 순위 '+myRank+'위</span></h2><p class="d">누적 포인트 순위예요. (지금은 로컬/모의 — 출시 땐 토스 리더보드로 전국 랭킹 연동 예정)</p>'+
      board.map((x,i)=>'<div class="rk'+(x.me?' me':'')+'"><div class="rank">'+(i<3?['🥇','🥈','🥉'][i]:(i+1))+'</div><div class="nm">'+x.nm+'</div><div class="sc">'+x.sc.toLocaleString()+'P</div></div>').join('')+
      '<button class="close" onclick="closeSheet()">닫기</button>';
  } else if(which==='more'){
    const hist=state.history.length?state.history.slice(0,8).map(h=>
      '<div class="row"><div class="n">'+h.emoji+' '+(h.rank>0?h.label:h.matches+'개')+'</div><div class="m">'+h.t+'</div><div class="pt">'+(h.points>0?'+'+h.points.toLocaleString()+'P':'-')+'</div></div>'
    ).join(''):'<div class="note">아직 추첨 기록이 없어요.</div>';
    b.innerHTML='<h2>더보기 ⚙️</h2>'+
      '<div class="ach"><div class="ai">'+(state.muted?'🔇':'🔊')+'</div><div class="at"><div class="t">소리</div><div class="s">추첨·당첨 효과음</div></div><div class="badge '+(state.muted?'todo':'')+'" onclick="toggleMute()" style="cursor:pointer">'+(state.muted?'꺼짐':'켜짐')+'</div></div>'+
      '<div class="ach"><div class="ai">⚡</div><div class="at"><div class="t">테스트 모드</div><div class="s">티켓 무한 (개발 확인용)</div></div><div class="badge '+(TEST?'':'todo')+'" onclick="toggleTest()" style="cursor:pointer">'+(TEST?'켜짐':'꺼짐')+'</div></div>'+
      '<div class="ach"><div class="ai">↺</div><div class="at"><div class="t">기록 초기화</div><div class="s">포인트·티켓·도전과제 리셋</div></div><div class="badge todo" onclick="resetAll()" style="cursor:pointer">초기화</div></div>'+
      '<h2 style="font-size:16px;margin-top:18px">최근 기록 🧾</h2>'+hist+
      '<div class="note">실제 앱에선 토스 게임 로그인으로 계정 연동 · 토스 리더보드로 랭킹이 동작해요.</div>'+
      '<button class="close" onclick="closeSheet()">닫기</button>';
  }
  document.getElementById('sheetWrap').classList.add('open');
}
function closeSheet(){document.getElementById('sheetWrap').classList.remove('open');}
function toggleTest(){TEST=!TEST;refillTickets();render();openSheet('more');toast('테스트 모드 '+(TEST?'ON (티켓 무한)':'OFF'));}
function toggleMute(){state.muted=!state.muted;save();render();const ob=document.getElementById('sheetWrap');if(ob.classList.contains('open'))openSheet('more');toast(state.muted?'🔇 소리 꺼짐':'🔊 소리 켜짐');}
let adBusy=false;
function watchAd(){if(adBusy)return;adBusy=true;toast('📺 광고 시청 중…');
  setTimeout(()=>{state.tickets=Math.min(MAX_TICKETS,state.tickets+2);save();render();openSheet('recharge');toast('🎟️ 티켓 +2 적립!');adBusy=false;},1200);}
function buyTicketWithPoints(cost){if(state.tickets>=MAX_TICKETS){toast('티켓이 이미 가득 찼어요');return;}
  if(state.points<cost){toast('💎 포인트가 부족해요 ('+cost+'P 필요)');return;}
  state.points-=cost;state.tickets=Math.min(MAX_TICKETS,state.tickets+1);save();render();openSheet('recharge');toast('🎟️ 티켓 1개 교환 완료');}
function shareResult(rank,matches){const labels={1:'1등 잭팟',2:'2등',3:'3등',4:'4등',5:'5등'};
  toast('📤 "오늘의 행운"에서 '+(labels[rank]||matches+'개')+' 당첨! (공유 모의)');}
function resetAll(){state=fresh();save();sel=[];closeSheet();
  document.getElementById('balls').innerHTML='';document.getElementById('verdict').style.display='none';
  document.getElementById('ph').style.display='block';document.getElementById('glow').style.opacity='0';render();toast('기록을 초기화했어요');}

// ===== 랭킹 페이지 (rank.png 매칭) =====
const RANK_DATA=[
 {name:'행운이',score:12470,av:'🐱',up:0},
 {name:'Lucky_77',score:9850,av:'🐰',up:1},
 {name:'코코비',score:8210,av:'🐹',up:-1},
 {name:'햇살미녀',score:7250,av:'🐻',up:1},
 {name:'행운v사',score:6320,av:'🐶',up:0},
 {name:'로꼬대장',score:5780,av:'🦊',up:2},
 {name:'콩나무',score:4910,av:'🐨',up:-1},
 {name:'클로버',score:4230,av:'🐸',up:1},
 {name:'네잎이',score:3110,av:'🐥',up:0},
];
function upTag(u){return u>0?'<span class="rp-up up">▲'+u+'</span>':u<0?'<span class="rp-up down">▼'+(-u)+'</span>':'<span class="rp-up same">–</span>';}
function podCard(x,rank){const cls=rank===1?'first':rank===2?'second':'third';
  return '<div class="pod '+cls+'">'+(rank===1?'<div class="crown">👑</div>':'')+
   '<div class="ava">'+x.av+'</div><div class="nm">'+x.name+'</div><div class="sc">'+x.score.toLocaleString()+'P</div>'+
   '<div class="base">'+rank+'</div></div>';}
function rankRow(x,rank){return '<div class="rp-row"><div class="rp-rank">'+rank+'</div><div class="rp-ava">'+x.av+'</div><div class="rp-nm">'+x.name+'</div><div class="rp-sc">'+x.score.toLocaleString()+'P</div>'+upTag(x.up)+'</div>';}
function openRank(){
  const board=[...RANK_DATA.map(x=>({...x})),{name:'나',score:state.points,av:'🍀',up:0,me:true}].sort((a,b)=>b.score-a.score);
  const myRank=board.findIndex(x=>x.me)+1;
  const lvl=1+Math.floor(state.plays/3);
  document.getElementById('podium').innerHTML=podCard(board[1],2)+podCard(board[0],1)+podCard(board[2],3);
  document.getElementById('rpList').innerHTML=board.slice(3,12).map((x,i)=>rankRow(x,i+4)).join('');
  document.getElementById('rpMe').innerHTML='<div class="rp-rank">'+myRank+'</div><div class="rp-ava">🍀</div><div class="rp-nm">나 (Lv.'+lvl+')</div><div class="rp-sc">'+state.points.toLocaleString()+'P</div>'+upTag(0);
  document.getElementById('rankPage').classList.add('open');
}
function closeRank(){document.getElementById('rankPage').classList.remove('open');}

// ================= 사운드 (WebAudio, 무외부) =================
let actx=null;
function ac(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch{}}return actx;}
function beep(f){if(state.muted)return;const c=ac();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.frequency.value=f;o.type='triangle';
  g.gain.setValueAtTime(.06,c.currentTime);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+.18);
  o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.2);}
function win_chime(rank){const c=ac();if(!c)return;const notes=rank<=2?[523,659,784,1047]:rank<=4?[523,659,784]:[523,659];
  notes.forEach((f,i)=>setTimeout(()=>beep(f),i*110));}

// ================= 컨페티 =================
const cv=document.getElementById('fx'),cx=cv.getContext('2d');let parts=[],raf=null;
function rs(){cv.width=innerWidth;cv.height=innerHeight;}rs();addEventListener('resize',rs);
const CS=['#7C5CFF','#FF7AD9','#7DE3D0','#FFD56B','#A78BFA','#5BE0C0'];
function confetti(n){for(let i=0;i<n;i++)parts.push({x:innerWidth/2+(Math.random()-.5)*150,y:innerHeight*.32,
  vx:(Math.random()-.5)*9,vy:-(Math.random()*11+5),g:.28,s:Math.random()*7+4,rot:Math.random()*6,vr:(Math.random()-.5)*.4,c:CS[i%CS.length],life:90+Math.random()*40});
  if(!raf&&parts.length)tick();}
function tick(){cx.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life--;
    cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.fillStyle=p.c;cx.globalAlpha=Math.max(0,Math.min(1,p.life/30));
    cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);cx.restore();});
  parts=parts.filter(p=>p.life>0&&p.y<cv.height+40);
  if(parts.length)raf=requestAnimationFrame(tick);else{cx.clearRect(0,0,cv.width,cv.height);raf=null;}}

// ================= 토스트 =================
let toastTimer=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}

for(let n=1;n<=POOL;n++){const b=document.createElement('button');b.className='num';b.dataset.n=n;b.textContent=n;b.onclick=()=>toggle(n);grid.appendChild(b);}

  document.getElementById('ticketTimer').textContent=ticketTimerText();
  if(!TEST&&state.tickets<MAX_TICKETS){const before=state.tickets;refillTickets();if(state.tickets!==before)render();}
},1000);
